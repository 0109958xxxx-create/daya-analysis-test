<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사칙연산 계산기</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #222;
      font-family: Arial, sans-serif;
    }

    .calculator {
      width: 360px;
      background: #000;
      padding: 24px;
      border-radius: 24px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.45);
    }

    .display {
      width: 100%;
      min-height: 90px;
      margin-bottom: 20px;
      padding: 18px;
      background: #111;
      color: #fff;
      border-radius: 16px;
      text-align: right;
      font-size: 32px;
      font-weight: bold;
      word-break: break-all;
      overflow-wrap: break-word;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      height: 64px;
      border: none;
      border-radius: 14px;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.15s;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .number {
      background: #ffd400;
      color: #000;
    }

    .operator {
      background: #333;
      color: #fff;
    }

    .function {
      background: #666;
      color: #fff;
    }

    .equal {
      background: #005bac;
      color: #fff;
    }

    .zero {
      grid-column: span 2;
    }
  </style>
</head>

<body>
  <div class="calculator">
    <div class="display" id="display">0</div>

    <div class="buttons">
      <button class="function" onclick="clearDisplay()">C</button>
      <button class="function" onclick="deleteLast()">⌫</button>
      <button class="operator" onclick="inputOperator('/')">÷</button>
      <button class="operator" onclick="inputOperator('*')">×</button>

      <button class="number" onclick="inputNumber('7')">7</button>
      <button class="number" onclick="inputNumber('8')">8</button>
      <button class="number" onclick="inputNumber('9')">9</button>
      <button class="operator" onclick="inputOperator('-')">−</button>

      <button class="number" onclick="inputNumber('4')">4</button>
      <button class="number" onclick="inputNumber('5')">5</button>
      <button class="number" onclick="inputNumber('6')">6</button>
      <button class="operator" onclick="inputOperator('+')">+</button>

      <button class="number" onclick="inputNumber('1')">1</button>
      <button class="number" onclick="inputNumber('2')">2</button>
      <button class="number" onclick="inputNumber('3')">3</button>
      <button class="equal" onclick="calculate()">=</button>

      <button class="number zero" onclick="inputNumber('0')">0</button>
      <button class="number" onclick="inputDecimal()">.</button>
      <button class="function" onclick="showTrillion()">조</button>
    </div>
  </div>

  <script>
    let currentInput = "0";
    let previousInput = "";
    let operator = null;
    let shouldResetDisplay = false;

    const display = document.getElementById("display");

    function updateDisplay() {
      display.textContent = formatNumber(currentInput);
    }

    function formatNumber(value) {
      if (value === "오류") return value;

      const [integerPart, decimalPart] = value.split(".");
      const formattedInteger = Number(integerPart).toLocaleString("ko-KR");

      if (decimalPart !== undefined) {
        return formattedInteger + "." + decimalPart;
      }

      return formattedInteger;
    }

    function inputNumber(number) {
      if (shouldResetDisplay) {
        currentInput = number;
        shouldResetDisplay = false;
      } else {
        if (currentInput === "0") {
          currentInput = number;
        } else {
          currentInput += number;
        }
      }

      updateDisplay();
    }

    function inputDecimal() {
      if (shouldResetDisplay) {
        currentInput = "0.";
        shouldResetDisplay = false;
      } else if (!currentInput.includes(".")) {
        currentInput += ".";
      }

      updateDisplay();
    }

    function inputOperator(selectedOperator) {
      if (operator !== null && !shouldResetDisplay) {
        calculate();
      }

      previousInput = currentInput;
      operator = selectedOperator;
      shouldResetDisplay = true;
    }

    function calculate() {
      if (operator === null || shouldResetDisplay) return;

      const prev = Number(previousInput);
      const current = Number(currentInput);
      let result;

      if (operator === "+") {
        result = prev + current;
      } else if (operator === "-") {
        result = prev - current;
      } else if (operator === "*") {
        result = prev * current;
      } else if (operator === "/") {
        if (current === 0) {
          currentInput = "오류";
          operator = null;
          previousInput = "";
          shouldResetDisplay = true;
          updateDisplay();
          return;
        }

        result = prev / current;
      }

      currentInput = String(result);
      operator = null;
      previousInput = "";
      shouldResetDisplay = true;

      updateDisplay();
    }

    function clearDisplay() {
      currentInput = "0";
      previousInput = "";
      operator = null;
      shouldResetDisplay = false;
      updateDisplay();
    }

    function deleteLast() {
      if (shouldResetDisplay || currentInput === "오류") {
        currentInput = "0";
        shouldResetDisplay = false;
      } else {
        currentInput = currentInput.length > 1
          ? currentInput.slice(0, -1)
          : "0";
      }

      updateDisplay();
    }

    function showTrillion() {
      currentInput = "1000000000000";
      shouldResetDisplay = false;
      updateDisplay();
    }

    document.addEventListener("keydown", function(event) {
      const key = event.key;

      if (!isNaN(key)) {
        inputNumber(key);
      } else if (key === ".") {
        inputDecimal();
      } else if (key === "+") {
        inputOperator("+");
      } else if (key === "-") {
        inputOperator("-");
      } else if (key === "*") {
        inputOperator("*");
      } else if (key === "/") {
        inputOperator("/");
      } else if (key === "Enter" || key === "=") {
        calculate();
      } else if (key === "Backspace") {
        deleteLast();
      } else if (key === "Escape") {
        clearDisplay();
      }
    });

    updateDisplay();
  </script>
</body>
</html>
